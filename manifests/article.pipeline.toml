# v1.1 article pipeline. Adds SourceResolver (between markdown_inbox and
# prompt_builder) and ConceptResolver (between article_parser and
# article_vault_plan). Both no-op when there's nothing to resolve, so
# article_clean still passes unchanged.
[pipeline]
nodes = [
  "markdown_inbox",
  "source_resolver",
  "prompt_builder",
  "llm_invoker",
  "article_parser",
  "concept_resolver",
  "article_vault_plan",
]
edges = [
  ["markdown_inbox", "source_resolver"],
  ["source_resolver", "prompt_builder"],
  ["prompt_builder", "llm_invoker"],
  ["llm_invoker", "article_parser"],
  ["article_parser", "concept_resolver"],
  ["concept_resolver", "article_vault_plan"],
]
