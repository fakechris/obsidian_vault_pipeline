<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OVP — Live Monitor</title>
  <link rel="stylesheet" href="./src/styles/global.css" />
</head>
<body>
  <nav class="nav-bar">
    <span class="nav-title">OVP</span>
    <a href="/viz/" class="nav-link">Home</a>
    <a href="/viz/graph.html" class="nav-link">3D Graph</a>
    <a href="/viz/flow.html" class="nav-link">Data Flow</a>
    <a href="/viz/explore.html" class="nav-link">Explore</a>
    <a href="/viz/monitor.html" class="nav-link active">Monitor</a>
  </nav>
  <main class="page-content">
    <div class="monitor-header">
      <h1>Pipeline Monitor</h1>
      <span id="status-badge" class="badge idle">○ IDLE</span>
    </div>
    <div id="progress-bar-container" class="hidden">
      <div id="progress-bar"></div>
      <span id="progress-text"></span>
    </div>
    <table id="source-table">
      <thead>
        <tr><th>Source</th><th>Stage</th><th>Status</th><th>Time</th></tr>
      </thead>
      <tbody id="source-tbody"></tbody>
    </table>
    <div class="event-log">
      <h2>Event Stream</h2>
      <div id="event-list"></div>
    </div>
  </main>
  <script type="module" src="./src/monitor.ts"></script>
</body>
