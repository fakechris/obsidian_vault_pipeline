<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OVP — Knowledge Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="./src/styles/global.css" />
  <link rel="stylesheet" href="./src/styles/graph.css" />
</head>
<body>
  <nav class="nav-bar">
    <span class="nav-title">OVP</span>
    <a href="/viz/" class="nav-link">Home</a>
    <a href="/viz/graph.html" class="nav-link active">Graph</a>
    <a href="/viz/flow.html" class="nav-link">Data Flow</a>
    <a href="/viz/explore.html" class="nav-link">Explore</a>
    <a href="/viz/monitor.html" class="nav-link">Monitor</a>
  </nav>

  <div id="controls">
    <select id="theme-filter">
      <option value="">All Themes</option>
    </select>
    <select id="type-filter">
      <option value="">All Types</option>
      <option value="claim">Claims</option>
      <option value="unit">Units</option>
      <option value="source">Sources</option>
    </select>
    <input type="text" id="search-input" placeholder="Search nodes…" />
    <button id="toggle-dag" title="Toggle DAG / Force layout">DAG</button>
    <button id="toggle-view" title="Switch to 3D immersive view">3D</button>
    <button id="reset-camera" title="Reset camera">⟳</button>
  </div>

  <div id="graph-stats"></div>

  <!-- 2D Cytoscape container (default) -->
  <div id="cy-container"></div>

  <!-- 3D container (loaded on demand) -->
  <div id="graph-container"></div>

  <div id="detail-panel" class="hidden">
    <button id="close-detail">✕</button>
    <div id="detail-content"></div>
  </div>

  <div id="legend">
    <span class="legend-item"><span class="dot claim"></span> Claim</span>
    <span class="legend-item"><span class="dot unit"></span> Unit</span>
    <span class="legend-item"><span class="dot source"></span> Source</span>
  </div>

  <script type="module" src="./src/graph-main.ts"></script>
</body>
</html>
