- id: openclaw-memory-system
  title: OpenClaw Three-Store Memory System
  aliases:
  - openclaw
  - openclaw-memory
  - memory-md-daily-logs-snapshots
  concept_type: system
  expected_meaning: OpenClaw's long-term memory built from three markdown stores - memory.md (semantic), daily logs (episodic), and session snapshots (episodic) - with extraction on compression / session reset / explicit request.
  required_evidence:
  - memory.md（记忆）：属于语义记忆... daily logs（每日日志）：属于情景记忆... session snapshots（会话快照）：属于情景层记忆
  - '抽取发生在三种情况下: 对话即将被压缩... 你用 /new 或 /reset 命令开启一个新会话... 用户要求记忆时候'
  - OpenClaw 的记忆系统问题不少：1. 很费Token 2. Markdown 没了记忆就消失 3. 经常遗忘东西
  acceptable_claims:
  - OpenClaw stores long-term memory in memory.md (semantic), daily logs (episodic, append-only), and session snapshots (last 15 meaningful messages on /new or /reset).
  - Extraction triggers on impending compression, session reset, or explicit user request.
  - On a new conversation memory.md plus today/yesterday's daily logs are auto-injected; memory search uses fusion (keyword + vector) then memory get.
  - Known limitations - token-heavy, fragile (lost markdown = lost memory), and forgetful.
  may_merge_with: []
  must_not_confuse_with:
  - everos-system
  - context-compression
