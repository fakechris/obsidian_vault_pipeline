- id: context-compression
  title: Context Compression (Single-Session Memory)
  aliases:
  - conversation-compression
  - 上下文压缩
  - single-session-memory
  concept_type: procedure
  expected_meaning: Summarizing/condensing the running chat history and re-injecting it into the prompt so a single long conversation stays within the context window.
  required_evidence:
  - 当聊天记录很多，以至于超过大模型接受聊天历史最大值时。它就会压缩聊天记录，就是把当前回话对话历史总结提炼一下，然后又塞回提示词
  - 上面就是模型如何在单个冗长对话中保持记忆的原理
  acceptable_claims:
  - LLM API calls are stateless; the chat history is resent each turn to preserve recent memory.
  - When history exceeds the context window it is summarized and re-injected to free space.
