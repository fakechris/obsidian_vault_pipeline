must_not_mint:
- slug: episodic-memory
  reason: synonym-of-X (should merge into agent-memory-taxonomy) - one of the three taxonomy types, not a standalone differentiated concept in this article
- slug: semantic-memory
  reason: synonym-of-X (should merge into agent-memory-taxonomy) - one of the three taxonomy types; article does not develop it as an independent concept
- slug: procedural-memory
  reason: synonym-of-X (should merge into agent-memory-taxonomy) - one of the three taxonomy types; carries no procedural-specific body content
- slug: hybrid-retrieval
  reason: synonym-of-X (should merge into active-retrieval) - hybrid is just one of EverOS's four modes; the article's retrieval point is active vs passive, not hybrid as its own concept
- slug: locomo-benchmark
  reason: unsupported as standalone concept - a single passing evaluation number (93.05% vs Zep 85.22%); belongs as a claim under everos-system, not its own evergreen
- slug: foresight-memory
  reason: synonym-of-X (should merge into everos-six-type-taxonomy) - Foresight is one of EverOS's six memory subtypes, defined only inside that taxonomy
- slug: vector-database
  reason: umbrella label - listed in the intro as jargon the article deliberately avoids explaining; never developed
- slug: rag
  reason: umbrella label - named only in the intro jargon list as a term, never explained or used as a concept
- slug: working-memory
  reason: unsupported by body - mentioned only as a one-line human analogy (工作记忆和长期记忆), not developed
- slug: agent-long-term-memory
  reason: article thesis / umbrella - this is the article's overall subject, not a discrete concept
coverage:
  primary_note_should_cover:
  - single-session vs cross-session memory and context compression
  - the two-question framework (classify + extract/update/retrieve)
  - OpenClaw three stores plus its limitations and trigger model
  - EverOS 6-type taxonomy, consolidation, retrieval modes, skill self-evolution
  - EverOS ecosystem (API, plugins, use cases) and LoCoMo result
  evergreen_should_cover:
  - agent-memory-taxonomy
  - memory-system-framework
  - context-compression
  - openclaw-memory-system
  - everos-system
  - everos-six-type-taxonomy
  - semantic-consolidation
  - skill-self-evolution
  - active-retrieval
  primary_only_ok:
  - LoCoMo 93.05% vs Zep 85.22% benchmark number
  - Foresight subtype example (proposal-by-next-Friday)
  - EverOS free Cloud API / pip install / 20 use cases (MemoCare, Game of Thrones, OpenHer)
  - EverMind being a Shanda AI-native company and 4500+ stars
  - the human working-memory / long-term-memory analogy
known_disagreements_with_nowledge:
- item: M6 LoCoMo 93.05% vs Zep 85.22% benchmark
  decision: primary-note-only
  why: The article states it as a single supporting metric for EverOS; it is a claim about everos-system, not a concept warranting its own evergreen.
- item: M7 Foresight memory (time-bound future predictions)
  decision: merge-into-X
  why: Foresight is defined only as one of EverOS's six subtypes; merge into everos-six-type-taxonomy rather than minting standalone.
- item: M2 EverOS 6-type taxonomy
  decision: mint-as-evergreen
  why: The article devotes a full section to the 6-type refinement with distinct subtypes; it is a genuine taxonomy concept distinct from the basic 3-type model.
- item: M11 OpenClaw three-trigger extraction model
  decision: merge-into-X
  why: Real article content but it is a property of openclaw-memory-system; fold it in as a claim rather than minting a separate concept.
- item: M12 active vs passive retrieval + M4 four retrieval modes
  decision: mint-as-evergreen
  why: The article's stated point is the active-reconstruction retrieval logic (with the four modes as detail); captured as the single active-retrieval concept, not a separate hybrid-retrieval note.
- item: M1 two-question framework
  decision: mint-as-evergreen
  why: The article explicitly frames it as the reusable lens for understanding any memory system; it is a genuine principle (memory-system-framework).
- item: M14 EverOS ecosystem / plugins / use cases
  decision: primary-note-only
  why: Ecosystem facts (plugins, MemoCare, etc.) support everos-system but are mention-level detail, not a distinct concept.
- item: OVP episodic-memory / semantic-memory / procedural-memory trio
  decision: merge-into-X
  why: The article presents these only as the three buckets of the Google taxonomy with no slug-specific body; they collapse into agent-memory-taxonomy.
