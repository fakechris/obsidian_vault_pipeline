- id: memory-system-framework
  title: Two-Question Memory-System Framework (Classify + Extract/Update/Retrieve)
  aliases:
  - two-question-framework
  - extract-update-retrieve
  - three-stage-mechanism
  concept_type: principle
  expected_meaning: An analytical lens for understanding any agent memory system by answering two questions - how memory is classified, and how it is extracted, updated, and retrieved.
  required_evidence:
  - 1. 记忆有多少种分类，每种存什么的？ 2. 记忆是如何抽取，更新，检索？
