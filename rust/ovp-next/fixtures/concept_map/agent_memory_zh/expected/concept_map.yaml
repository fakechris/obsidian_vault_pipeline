- id: agent-memory-taxonomy
  title: Agent Memory Taxonomy (Episodic / Semantic / Procedural)
  aliases:
  - memory-taxonomy
  - three-type-memory
  - episodic-semantic-procedural
  concept_type: taxonomy
  expected_meaning: A cognitive-science-derived classification dividing agent memory into episodic (what happened), semantic (stable facts about you), and procedural (how to do things) memory.
  required_evidence:
  - Google 在 2025 年 11 月发表了一篇论文，标题叫《Context Engineering, Sessions and Memory》... 把Agent的记忆分为三类
  - 情景记忆：昨天发生了啥；语义记忆：你叫什么、喜欢什么；程序性记忆：怎么完成一件事
  acceptable_claims:
  - The Google 2025-11 paper "Context Engineering, Sessions and Memory" classifies agent memory into three types echoing cognitive science.
  - Episodic = recent events, semantic = stable identity/preferences, procedural = how-to/process knowledge.
  may_merge_with:
